<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>TOKETHUB | Detalle del Evento</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=Manrope:wght@700;800&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1" rel="stylesheet" />
    
    <link rel="stylesheet" href="/CSS/descripcion.css">
    <link rel="stylesheet" href="/CSS/carrito.css">
</head>
<body>
    <nav class="nav-shell">
        <a href="index.html" class="brand-logo">TOKETHUB</a>
        <div class="nav-actions">
            <a href="index.html" class="nav-link-icon">
                <span class="material-symbols-outlined">explore</span>
            </a>
            <div class="cart-trigger" id="cart-icon-btn">
                <span class="material-symbols-outlined">shopping_cart</span>
                <span id="cart-count" class="cart-badge">0</span>
            </div>
        </div>
    </nav>

    <main>
        <section class="hero-canvas">
            <img id="event-banner" src="" alt="Event Banner" class="hero-image" />
            <div class="hero-overlay"></div>
            <div class="hero-content">
                <span id="event-category" class="category-pill">Categoría</span>
                <h1 id="event-title" class="event-headline">Cargando evento...</h1>
                <div class="event-quick-meta">
                    <div class="meta-item">
                        <span class="material-symbols-outlined">calendar_today</span>
                        <span id="event-date">--/--/--</span>
                    </div>
                    <div class="meta-item">
                        <span class="material-symbols-outlined">location_on</span>
                        <span id="event-location">Ubicación</span>
                    </div>
                </div>
            </div>
        </section>

        <section class="details-grid">
            <div class="main-info">
                <h2 class="section-title">Sobre la Experiencia</h2>
                <p id="event-description" class="description-text">
                    Cargando información detallada del evento...
                </p>
            </div>

            <aside class="sidebar-info">
                <div class="info-card">
                    <div class="glow-accent"></div>
                    <h3 class="sidebar-headline">Tickets & Reserva</h3>
                    
                    <div class="detail-row">
                        <span class="detail-label">Precio</span>
                        <span id="event-price" class="detail-value-price">$0.00</span>
                    </div>
                    
                    <div class="detail-row">
                        <span class="detail-label">Disponibilidad</span>
                        <span class="detail-value">Inmediata</span>
                    </div>

                    <button id="btn-add-detail" class="btn-purchase-main">
                        <span class="material-symbols-outlined">add_shopping_cart</span>
                        Añadir al Carrito
                    </button>
                </div>
            </aside>
        </section>
    </main>

    <footer class="site-footer">
        <div class="brand-logo">TOKETHUB</div>
        <p class="footer-copy">© 2024 TOKETHUB. Experiencia de ticketing premium.</p>
    </footer>

    <script src="/JS/script_carrito.js"></script>
    <script src="/JS/script_descripcion.js"></script>
</body>
</html>
