<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>TOKETHUB | Detalle del Evento</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=Manrope:wght@700;800&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1" rel="stylesheet" />
    
    <link rel="stylesheet" href="../CSS/descripcion.css">
    <link rel="stylesheet" href="../CSS/carrito.css">
</head>
<body>
    <nav class="nav-shell">
        <a href="../index.html" class="brand-logo">TICKETHUB</a>
        <div class="nav-actions">
            <a href="../index.html" class="nav-link-icon">
                <span class="material-symbols-outlined">explore</span>
            </a>
            <div class="cart-trigger" id="cart-icon-btn" style="cursor:pointer;">
                <span class="material-symbols-outlined">shopping_cart</span>
                <span id="cart-count" class="cart-badge">0</span>
            </div>
        </div>
    </nav>

    <main>
        <section class="hero-canvas">
            <img id="event-banner" src="" alt="Event Banner" class="hero-image" />
            <div class="hero-overlay"></div>
            <div class="hero-content">
                <span id="event-category" class="category-pill">Category</span>
                <h1 id="event-title" class="event-headline">Loading...</h1>
                <div class="event-quick-meta">
                    <div class="meta-item">
                        <span class="material-symbols-outlined">calendar_today</span>
                        <span id="event-date">--/--/--</span>
                    </div>
                    <div class="meta-item">
                        <span class="material-symbols-outlined">location_on</span>
                        <span id="event-location">Location</span>
                    </div>
                </div>
            </div>
        </section>

        <section class="details-grid">
            <div class="main-info">
                <h2 class="section-title">About the experience</h2>
                <p id="event-description" class="description-text">Cargando...</p>
            </div>

            <aside class="sidebar-info">
                <div class="info-card">
                    <h3 class="sidebar-headline">Tickets & Reserve</h3>
                    <div class="detail-row">
                        <span class="detail-label">Price</span>
                        <span id="event-price" class="detail-value-price">$0.00</span>
                    </div>
                    <button id="btn-add-detail" class="btn-purchase-main" onclick="window.agregarAlCarritoDeDescripcion()">
                        <span class="material-symbols-outlined">add_shopping_cart</span>
                        Add to Cart
                    </button>
                </div>
            </aside>
        </section>
    </main>

    <div class="modal-overlay" id="cart-modal">
        <div class="modal-card">
            <button class="close-modal" id="close-modal-btn">
                <span class="material-symbols-outlined">close</span>
            </button>
            <div class="modal-items-section">
                <div class="modal-header">
                    <div>
                        <span class="tagline">Your Selection </span>
                        <h2 class="title">Shopping Cart</h2>
                    </div>
                </div>
                <div id="modal-cart-items"></div>
            </div>

            <div class="modal-checkout-section">
                <div class="summary-block">
                    <span class="summary-label">Order Summary</span>
                    <div class="total-row">
                        <span class="total-label">Total Amount</span>
                        <span class="total-amount">$<span id="total-price">0.00</span></span>
                    </div>
                </div>

                <form class="checkout-form" id="checkout-form">
                    <h3 class="form-title">Personal Information</h3>

                    <div class="form-group">
                        <label class="form-label">Identification Number</label>
                        <input type="text" id="cust-id" class="form-input" placeholder="ID / Passport" required>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Full Name</label>
                        <input type="text" id="cust-name" class="form-input" placeholder="Example: John Doe" required>
                    </div>

                    <div class="form-group">
                        <label class="form-label">E-mail Address</label>
                        <input type="email" id="cust-email" class="form-input" placeholder="john@example.com" required>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Physical Address</label>
                        <input type="text" id="cust-address" class="form-input" placeholder="Street, City, Zip" required>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Phone Number</label>
                        <input type="tel" id="cust-phone" class="form-input" placeholder="+1 234 567 890" required>
                    </div>

                    <button class="btn-primary" id="btn-complete-purchase" type="submit">Buy Tickets Now</button>
                    <button class="btn-ghost" id="continue-shopping" type="button">Continue Shopping</button>
                </form>
            </div>
        </div>
    </div>

    <script src="../JS/script_carrito.js"></script>
    <script src="../JS/script_descripcion.js"></script>
</body>
</html>
