<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>TICKETHUB Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/CSS/login-page.css" />
    
    <script src="/JS/login.js" defer></script>
</head>
<body>

    <div class="login-container">
        <ticket-hub-branding></ticket-hub-branding>
    
        <main class="login-card">
            <div class="card-header">
                <h2 class="card-title">Welcome Back</h2>
                <p class="card-description">Enter your credentials to access the cockpit.</p>
            </div>
            
            <form class="login-form">
                <ticket-hub-input 
                    id="email-field" 
                    label="Email" 
                    type="email" 
                    icon="mail" 
                    placeholder="name@company.com">
                </ticket-hub-input>
            
                <ticket-hub-input 
                    id="password-field" 
                    label="Password" 
                    type="password" 
                    icon="lock" 
                    placeholder="••••••••">
                </ticket-hub-input>
            
                <button class="submit-button" type="submit">
                    <span>Ingresar</span>
                    <span class="material-symbols-outlined">arrow_forward</span>
                </button>
            </form>
    
            <footer class="card-footer">
                <p class="support-text">
                    Having trouble logging in? <br class="mobile-break" />
                    <a class="support-link" href="#">Contact System Support</a>
                </p>
            </footer>
        </main>
    </div>

    <div class="bg-glow-1"></div>
    <div class="bg-glow-2"></div>

</body>
</html>
