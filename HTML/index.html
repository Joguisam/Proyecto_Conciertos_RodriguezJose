<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>TOKETHUB | Premium Event Marketplace</title>

    <link
        href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700;800&family=Inter:wght@400;500;600&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />

    <link rel="stylesheet" href="/CSS/carrito.css" />
    <link rel="stylesheet" href="/CSS/index.css" />
</head>

<body>
    <div class="app-container">
        <header>
            <div class="header-left">
                <a class="logo" href="#">TOKETHUB</a>
            </div>
            <div class="header-actions">
                <div class="search-bar">
                    <span class="material-symbols-outlined search-icon">search</span>
                    <input id="event-search" placeholder="Search by event name..." type="text" />
                </div>
                <button class="icon-btn" id="cart-icon-btn">
                    <span class="material-symbols-outlined">shopping_cart</span>
                    <span class="cart-badge" id="cart-count">0</span>
                </button>
                <a href="/HTML/login-page.html">
                    <button class="icon-btn" id="cart-icon-btn">
                        <span class="material-symbols-outlined">login</span>
                    </button>
                </a>

            </div>
        </header>
        <main>
            <div class="filters-container">
                <div class="pill-group" id="category-pills">
                    <button class="pill active" data-category="all">All Events</button>
                </div>

                <div class="filter-actions">
                    <div class="filter-group">
                        <label class="filter-label">City</label>
                        <div class="select-wrapper">
                            <select class="select-custom" id="city-filter">
                                <option value="all">All Cities</option>
                                <option>Guatemala City - Cementos Progreso</option>
                                <option>Guatemala City - Cayala</option>
                                <option>Guatemala City - Estadio Mateo Flores</option>
                                <option>Guatemala City - Mundo E</option>
                            </select>
                            <span class="material-symbols-outlined select-icon">expand_more</span>
                        </div>
                    </div>

                    <div class="filter-group">
                        <label class="filter-label">Max Price ($)</label>
                        <input type="number" id="price-filter" placeholder="Any" class="filter-input-num" min="0">
                    </div>

                    <div class="filter-group">
                        <label class="filter-label">Date Range</label>
                        <div class="date-inputs">
                            <input type="date" id="date-start" class="filter-input-date">
                            <input type="date" id="date-end" class="filter-input-date">
                        </div>
                    </div>
                </div>
            </div>

            <div class="section-header">
                <h2 class="section-title">Upcoming Events</h2>
                <span id="results-count" class="results-badge"></span>
            </div>

            <div id="event-grid" class="event-grid"></div>
        </main>
    </div>

    <div class="modal-overlay" id="cart-modal">
        <div class="modal-card">
            <button class="close-modal" id="close-modal-btn">
                <span class="material-symbols-outlined">close</span>
            </button>
            <div class="modal-items-section">
                <div class="modal-header">
                    <div>
                        <span class="tagline">Your Selection </span>
                        <h2 class="title">Shopping Cart</h2>
                    </div>
                </div>
                <div id="cart-items-container"></div>
            </div>

            <div class="modal-checkout-section">
                <div class="summary-block">
                    <span class="summary-label">Order Summary</span>
                    <div class="total-row">
                        <span class="total-label">Total Amount</span>
                        <span class="total-amount" id="cart-total-price">$0.00</span>
                    </div>
                </div>

                <form class="checkout-form" id="checkout-form" onsubmit="return false;">
                    <h3 class="form-title">Personal Information</h3>

                    <div class="form-group">
                        <label class="form-label">Identification Number</label>
                        <input type="text" id="cust-id" class="form-input" placeholder="ID / Passport" required>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Full Name</label>
                        <input type="text" id="cust-name" class="form-input" placeholder="Example: John Doe" required>
                    </div>

                    <div class="form-group">
                        <label class="form-label">E-mail Address</label>
                        <input type="email" id="cust-email" class="form-input" placeholder="john@example.com" required>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Physical Address</label>
                        <input type="text" id="cust-address" class="form-input" placeholder="Street, City, Zip"
                            required>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Phone Number</label>
                        <input type="tel" id="cust-phone" class="form-input" placeholder="+1 234 567 890" required>
                    </div>

                    <button class="btn-primary" id="btn-complete-purchase">Buy Tickets Now</button>
                    <button class="btn-ghost" id="continue-shopping">Continue Shopping</button>
                </form>
            </div>
        </div>
    </div>
        <script src="/JS/script_carrito.js"></script>
    <script src="/JS/script_index.js"></script>

</body>

</html>
